<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Torch Table 0.4</title>
<style>
:root{
  --bg:#161616;
  --panel:#202020;
  --panel2:#262626;
  --line:#4a4a4a;
  --line2:#666;
  --text:#e7e7e7;
  --muted:#a7a7a7;
  --dark:#0d0d0d;
  --accent:#d9d9d9;
  --danger:#ff5c5c;
  --good:#9be09b;
  --warn:#ffd36b;
  --cell:16px;
  --font: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  padding:clamp(6px,1vw,12px);
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  overflow:hidden;
  font-size:clamp(10px,.78vw,13px);
}
body.light{
  --bg:#efefef; --panel:#fbfbfb; --panel2:#ececec; --line:#999; --line2:#777;
  --text:#141414; --muted:#555; --dark:#fff; --accent:#111;
}
button,input,select,textarea{
  font:inherit;
  color:var(--text);
  background:var(--dark);
  border:1px solid var(--line);
  border-radius:0;
}
body.light button,body.light input,body.light select,body.light textarea{color:var(--text);background:#fff;}
body.light #grid{background:#d7d7d7;}
body.light .cell{border-color:rgba(0,0,0,.18);}
body.light .cell .icon{text-shadow:0 0 1px rgba(255,255,255,.6);}
button{cursor:pointer;padding:3px 7px;min-height:22px;text-transform:uppercase;letter-spacing:.02em;}
button:hover{border-color:var(--accent);}
button:active{transform:translateY(1px);}
button.danger{color:var(--danger);}
button.primary{border-color:var(--accent);}
input[type="checkbox"]{vertical-align:middle;}
h3,h4{margin:0 0 4px 0;line-height:1.05;text-transform:uppercase;letter-spacing:.06em;}
h3{font-size:clamp(10px,.85vw,14px);}
h4{font-size:clamp(9px,.75vw,12px);color:var(--muted);}

.app{
  height:calc(100vh - clamp(12px,2vw,24px));
  display:grid;
  grid-template-columns:minmax(430px, 1fr) minmax(410px, 1.1fr);
  grid-template-rows:minmax(0, 1fr) clamp(160px, 24vh, 230px);
  grid-template-areas:
    "entities map"
    "tools dice";
  gap:clamp(5px,.7vw,10px);
}
.panel{
  border:1px solid var(--line);
  background:linear-gradient(180deg,var(--panel),var(--dark));
  padding:clamp(4px,.55vw,8px);
  overflow:hidden;
  min-width:0;
  min-height:0;
}
.panelTitle{
  display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;
}
.panelTitle .miniBtns{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}

.entitiesPanel{grid-area:entities;display:grid;grid-template-rows:auto auto auto;gap:clamp(4px,.65vw,8px);}
.entitySection{min-height:0;overflow:hidden;display:flex;flex-direction:column;}
.entityGrid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:clamp(3px,.45vw,6px);
  min-height:0;
}
.entity{
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  padding:clamp(3px,.45vw,6px);
  min-width:0;
  display:grid;
  grid-template-rows:auto auto;
  gap:3px;
}
.entityTop{display:grid;grid-template-columns:auto 1fr auto;gap:4px;align-items:center;min-width:0;}
.keyBadge{min-width:22px;text-align:center;border:1px solid var(--line2);background:var(--dark);padding:1px 3px;color:var(--warn);overflow:hidden;}
.keyBadge.hidden{display:none;}
.entityName{width:100%;min-width:0;font-size:clamp(10px,.8vw,12px);padding:2px 3px;}
.hpWrap{display:flex;align-items:center;gap:2px;white-space:nowrap;color:var(--muted);}
.hpInput{width:clamp(36px,4vw,54px);padding:2px 3px;}
.statusRow{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.statusRow select{width:100%;min-width:0;padding:2px;font-size:clamp(9px,.72vw,11px);}

.mapPanel{grid-area:map;display:flex;flex-direction:column;align-items:center;gap:4px;}
.mapTabs{width:100%;display:grid;grid-template-columns:repeat(6,1fr);gap:2px;}
.gridTab{background:#303030;border:1px solid var(--line);text-align:center;padding:2px;cursor:pointer;user-select:none;overflow:hidden;white-space:nowrap;}
.gridTab.active{background:#666;color:white;border-color:#aaa;}
#gridShell{flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#grid{display:grid;border:1px solid var(--line2);background:#111;touch-action:none;}
.cell{
  width:var(--cell);height:var(--cell);
  border:1px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  user-select:none;overflow:hidden;box-sizing:border-box;
}
.cell .icon{color:black;pointer-events:none;line-height:1;font-size:calc(var(--cell) * .68);font-weight:400;text-shadow:0 0 1px rgba(255,255,255,.35);}
.cell .icon.bold{font-weight:900;}
.gridControls{width:100%;display:flex;flex-wrap:wrap;gap:4px;align-items:center;justify-content:center;font-size:clamp(9px,.72vw,11px);}
.gridControls label{white-space:nowrap;}

.toolsPanel{grid-area:tools;display:grid;grid-template-columns:minmax(150px,.65fr) minmax(360px,1.75fr) minmax(135px,.55fr);gap:clamp(4px,.55vw,8px);}
.toolBox{border:1px solid var(--line);background:rgba(255,255,255,.025);padding:clamp(4px,.5vw,7px);min-width:0;overflow:hidden;}
.generatorBox{display:flex;flex-direction:column;min-height:0;}
.generatorBox .buttonGrid{flex:0 0 auto;}
.generatorBox #genOutput{flex:1 1 auto;min-height:42px;max-height:none;}
.timerBox{display:flex;flex-direction:column;min-height:0;}
.timerBox .torchPanel{flex:1 1 auto;min-height:0;}
.buttonGrid{display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start;}
#genOutput,.readout{
  margin-top:4px;border:1px solid var(--line);background:var(--dark);padding:4px;min-height:32px;max-height:64px;overflow:auto;white-space:pre-wrap;color:var(--good);
}
.timerDisplay{font-size:clamp(18px,2.35vw,30px);letter-spacing:.08em;text-align:center;border:1px solid var(--line);background:#070707;margin:3px 0;padding:3px;color:var(--warn);}
body.light .timerDisplay{background:#fff;}
.timerControls,.presetControls,.counterControls{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center;}
.timerControls.oneLine{flex-wrap:nowrap;gap:2px;}
.timerControls.oneLine button{padding-left:4px;padding-right:4px;min-width:auto;}
.counterPill{border:1px solid var(--line);padding:2px 4px;background:var(--dark);display:grid;grid-template-columns:minmax(44px,1fr) auto auto auto;gap:3px;align-items:center;width:100%;}
.counterName{width:5.8ch;min-width:0;padding:1px 2px;text-transform:uppercase;color:var(--text);background:transparent;border:1px solid transparent;}
.counterName:focus{border-color:var(--line2);background:var(--dark);outline:none;}
.counterPill span{min-width:2ch;text-align:center;color:var(--warn);}
.counterBox{border:1px solid var(--line);background:rgba(255,255,255,.025);padding:clamp(4px,.5vw,7px);display:flex;flex-direction:column;gap:4px;overflow:hidden;}
.counterControls{display:flex;flex-direction:column;gap:4px;justify-content:flex-start;align-items:stretch;overflow:auto;}
.torchPanel{margin-top:3px;border:1px solid var(--line);padding:4px;background:rgba(255,255,255,.025);}
.torchRow{display:grid;grid-template-columns:1fr auto;gap:4px;align-items:center;}
.torchButton{position:relative;overflow:hidden;text-align:center;color:var(--text);background:#101010;min-height:24px;}
.torchButton::before{content:"";position:absolute;inset:0 auto 0 0;width:var(--torchFill,0%);background:rgba(255,50,50,.62);z-index:0;}
.torchButton span{position:relative;z-index:1;}
.torchButton.lit{border-color:var(--danger);}
.torchTime{text-align:center;color:var(--warn);font-size:9px;margin-top:2px;}

.dicePanel{grid-area:dice;display:grid;grid-template-columns:minmax(235px,1fr) clamp(120px,12vw,155px) minmax(176px,.58fr);gap:clamp(4px,.55vw,8px);}
.diceControls{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.diceControls button{min-width:32px;padding-left:4px;padding-right:4px;}
.diceHistory{
  margin-top:5px;border:1px solid var(--line);background:var(--dark);padding:5px;
  height:calc(100% - 54px);min-height:58px;overflow:auto;white-space:normal;line-height:1.45;
}
.diceToken{display:inline;color:var(--muted);}
.diceToken strong{color:var(--text);font-weight:700;}
.quickStats{border:1px solid var(--line);background:rgba(255,255,255,.025);padding:clamp(4px,.5vw,7px);display:flex;flex-direction:column;gap:5px;}
.quickStatsGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.quickStatsGrid div{border:1px solid var(--line);padding:3px;background:var(--dark);display:flex;justify-content:space-between;gap:5px;}
.quickStatsGrid span{color:var(--warn);}

.modalShade{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modalShade.open{display:flex;}
.modal{width:min(920px,96vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;background:var(--panel);border:2px solid var(--line2);box-shadow:0 0 0 4px rgba(0,0,0,.35);}
.modalHeader{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid var(--line);padding:8px;}
.modalBody{padding:8px;overflow:auto;}
.modalFooter{padding:8px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:5px;}
.notesTabs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.noteTab{border:1px solid var(--line);background:#333;padding:3px 7px;cursor:pointer;}
.noteTab.active{background:#666;color:white;}
textarea.bigText{width:100%;height:55vh;resize:none;padding:6px;}
.inventoryGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.invBox{border:1px solid var(--line);padding:5px;min-height:130px;display:flex;flex-direction:column;gap:3px;}
.invBox textarea{flex:1;min-height:95px;resize:none;padding:5px;}
.setupGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.setupBox{border:1px solid var(--line);padding:7px;background:rgba(255,255,255,.025);}
.setupRow{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin:5px 0;}
.statusEditor{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:4px;}
.keyEditor{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;}
.paletteGrid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;}
.paletteSwatch{height:34px;border:1px solid var(--line2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;text-transform:uppercase;color:#111;background:#eee;}
.paletteSwatch.darkText{color:#111;}
.paletteSwatch.lightText{color:#eee;}
.customColorRow{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.statusEditor input,.keyEditor input{width:100%;padding:3px;}
.helpText{line-height:1.55;white-space:pre-wrap;}
.hiddenFile{display:none;}
.isOff{display:none!important;}
.setupOptions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px;}
.setupOptions label{border:1px solid var(--line);padding:4px;background:var(--dark);}

@media (max-width:1050px){
  body{overflow:auto;}
  .app{height:auto;min-height:100vh;grid-template-columns:1fr;grid-template-rows:auto 70vh auto auto;grid-template-areas:"map" "entities" "dice" "tools";}
  .entitiesPanel{min-height:560px;}
  .toolsPanel{grid-template-columns:1fr;}
  .dicePanel{grid-template-columns:1fr;}
  .inventoryGrid,.setupGrid{grid-template-columns:1fr;}
}
@media (min-width:1500px){
  .app{grid-template-columns:minmax(620px, .9fr) minmax(720px,1.1fr);}
}
</style>
</head>
<body>
<div class="app">
  <section class="panel entitiesPanel">
    <div class="entitySection">
      <div class="panelTitle"><h3>Players</h3><div class="miniBtns"><button onclick="openModal('setup')">Setup</button><button id="inventoryBtn" onclick="openModal('inventory')">Inventory</button><button onclick="openModal('notes')">Notes</button></div></div>
      <div id="players" class="entityGrid"></div>
    </div>
    <div class="entitySection">
      <div class="panelTitle"><h3>Allies</h3></div>
      <div id="allies" class="entityGrid"></div>
    </div>
    <div class="entitySection">
      <div class="panelTitle"><h3>Monsters</h3></div>
      <div id="monsters" class="entityGrid"></div>
    </div>
  </section>

  <section class="panel mapPanel">
    <div id="gridTabsTop" class="mapTabs"></div>
    <div id="gridShell"><div id="grid"></div></div>
    <div id="gridTabsBottom" class="mapTabs"></div>
    <div class="gridControls">
      <label><input type="checkbox" id="keyToggle" onchange="renderEntities();refreshKeySelects();"> Key</label>
      <label><input type="checkbox" id="boldToggle" onchange="applyIconStyle()"> Bold</label>
      <label><input type="checkbox" id="quest" onchange="refreshKeySelects()"> Quest</label>
      <label><input type="checkbox" id="party" onchange="refreshKeySelects()"> Party</label>
      <label><input type="checkbox" id="extra1" onchange="refreshKeySelects()"> Extra 1</label>
      <label><input type="checkbox" id="extra2" onchange="refreshKeySelects()"> Extra 2</label>
      <button onclick="openModal('key')">Edit Key</button>
      <button onclick="openPalette()">Palette</button>
      <input type="color" id="colorPicker" style="display:none;">
      <label><input type="checkbox" id="customToggle"> Custom</label>
      <button onclick="resetGrid()">Reset</button>
      <label><input type="checkbox" id="lockToggle" checked> Lock</label>
    </div>
  </section>

  <section class="panel toolsPanel">
    <div class="toolBox">
      <div class="panelTitle"><h3>Torch Table 0.4</h3></div>
      <div class="buttonGrid">
        <button onclick="exportState()">Export</button>
        <button onclick="document.getElementById('importFile').click()">Import</button>
        <button onclick="openModal('help')">Help</button>
        <button id="lightBtn" onclick="toggleLight()">Light</button>
      </div>
      <input id="importFile" class="hiddenFile" type="file" accept="application/json,.json" onchange="importState(event)">
      <div class="readout" id="saveReadout">Welcome to Torch Table 0.4.</div>
    </div>

    <div class="toolBox generatorBox">
      <div class="panelTitle"><h3>Generators</h3></div>
      <div class="buttonGrid">
        <button onclick="genNPC('masc')">NPC1</button>
        <button onclick="genNPC('fem')">NPC2</button>
        <button onclick="genNPC('bad')">NPC3</button>
        <button onclick="genPlace()">Place</button>
        <button onclick="genThing()">Thing</button>
        <button onclick="genLoot()">Loot</button>
        <button onclick="genEncounter()">Encounter</button>
        <button onclick="genRumor()">Rumor</button>
        <button onclick="genQuest()">Quest</button>
        <button onclick="genTrap()">Trap</button>
        <button onclick="genWeather()">Weather</button>
      </div>
      <div id="genOutput">Generator output appears here.</div>
    </div>

    <div class="counterBox" id="counterBox">
      <div class="panelTitle"><h3>Counters</h3></div>
      <div class="counterControls" id="counterControls"></div>
    </div>
  </section>

  <section class="panel dicePanel">
    <div class="toolBox">
      <div class="panelTitle"><h3>Dice</h3><button onclick="clearDiceHistory()">Clear</button></div>
      <div class="diceControls">
        <button onclick="rollDiceExpr('d2')">d2</button>
        <button onclick="rollDiceExpr('d3')">d3</button>
        <button onclick="rollDiceExpr('d4')">d4</button>
        <button onclick="rollDiceExpr('d6')">d6</button>
        <button onclick="rollDiceExpr('d8')">d8</button>
        <button onclick="rollDiceExpr('d10')">d10</button>
        <button onclick="rollDiceExpr('d12')">d12</button>
        <button onclick="rollDiceExpr('d20')">d20</button>
        <button onclick="rollDiceExpr('d100')">d100</button>
        <button onclick="rollDiceExpr('2d6')">2d6</button>
        <button onclick="rollDiceExpr('3d6')">3d6</button>
        <button onclick="rollDropLowest()">4d6-L</button>
        <span id="diceExtraControls"><label>X <input type="number" id="diceMultiplier" value="1" min="1" max="99" style="width:42px"></label>
        <label><input type="checkbox" id="sumCheck" checked> SUM</label></span>
      </div>
      <div class="diceHistory" id="diceHistory"></div>
    </div>
    <div class="quickStats" id="quickStatsBox">
      <div class="panelTitle"><h3>Quick Stats</h3></div>
      <label><input type="checkbox" id="dropLowestStats"> 4d6 drop lowest</label>
      <div class="quickStatsGrid">
        <div>STR <span id="statSTR">0</span></div><div>DEX <span id="statDEX">0</span></div>
        <div>CON <span id="statCON">0</span></div><div>INT <span id="statINT">0</span></div>
        <div>WIS <span id="statWIS">0</span></div><div>CHA <span id="statCHA">0</span></div>
      </div>
      <button onclick="rollQuickStats()">Roll</button>
    </div>
    <div class="toolBox timerBox">
      <div class="panelTitle"><h3>Timer</h3></div>
      <div id="timerDisplay" class="timerDisplay">00:00</div>
      <div class="timerControls oneLine">
        <button onclick="timerStartPause()" id="timerStartBtn">Start</button>
        <button onclick="timerReset()">Reset</button>
        <button onclick="timerMode='up';timerSet(0)">SW</button>
        <button onclick="timerMode='down';timerSet(30)">30s</button>
        <button onclick="timerMode='down';timerSet(60)">1m</button>
        <button onclick="timerMode='down';timerSet(300)">5m</button>
        <button onclick="timerMode='down';timerSet(600)">10m</button>
        <button onclick="timerMode='down';timerSet(1800)">30m</button>
      </div>
      <div class="torchPanel">
        <div class="torchRow">
          <button id="torchButton" class="torchButton" onclick="lightTorch()"><span>Light Torch</span></button>
          <button class="danger" onclick="killTorch()">X</button>
        </div>
        <div id="torchTime" class="torchTime">60:00</div>
      </div>
    </div>
  </section>
</div>

<div class="modalShade" id="modalShade" onclick="shadeClose(event)">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modalHeader"><h3 id="modalTitle">Modal</h3><button onclick="closeModal()">X</button></div>
    <div class="modalBody" id="modalBody"></div>
    <div class="modalFooter" id="modalFooter"><button onclick="closeModal()">Close</button></div>
  </div>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const r = arr => arr[Math.random()*arr.length|0];

const defaultStatuses=["Normal","Blinded","Charmed","Deafened","Frightened","Grappled","Incapacitated","Invisible","Paralyzed","Petrified","Poisoned","Prone","Restrained","Stunned","Unconscious","Burning","Frozen","Bleeding","Cursed","Blessed","Concentrating","Hidden","Exhausted","Dazed","Custom 1","Custom 2","Custom 3","Custom 4","Custom 5","Custom 6","Custom 7","Custom 8"];
const maxCounts={players:9,allies:9,monsters:9};
let state={
  counts:{players:6,allies:3,monsters:9},
  statuses:[...defaultStatuses],
  entities:{players:[],allies:[],monsters:[]},
  notes:Array(12).fill(""), noteNames:Array.from({length:12},(_,i)=>"Note "+(i+1)), currentNote:0,
  inventory:{players:Array(9).fill(""),allies:Array(9).fill("")},
  keys:{players:[],allies:[],monsters:[]},
  counters:[{name:'Round',value:0},{name:'Turn',value:0},{name:'Alert',value:0},{name:'Pass',value:0}],
  options:{showInventory:true,showQuickStats:true,showCounters:true,showLight:true,showGenOutput:true,showDiceExtras:true},
  theme:{light:false}
};
for(const type of Object.keys(maxCounts)){
  for(let i=0;i<maxCounts[type];i++){
    const label=type==='players'?'Player':type==='allies'?'Ally':'Monster';
    state.entities[type].push({name:`${label} ${i+1}`,hp: type==='monsters'?8:10,status1:"Normal",status2:"Normal"});
  }
}

const baseIconSets={base:["","X","O"],quest:["?","!","$"],party:["Ω","Ψ","Δ","Θ","Σ","Φ","@","&","%"],extra1:["+","=","*","#"],extra2:["Y","Z","▲","◆"]};
state.keys.players=["Ω","Ψ","Δ","Θ","Σ","Φ","@","&","%"];
state.keys.allies=["+","=","*"];
state.keys.monsters=["X","O","#","Y","Z","?","!","$","◆"];

const palette=["","white","red","pink","blue","cyan","green","lime","purple","yellow","orange","brown","gray","black"];
let currentCustom=null;
let tabs=[
  {name:"L1",rows:24,cols:32,data:[]},{name:"L2",rows:24,cols:32,data:[]},{name:"L3",rows:24,cols:32,data:[]},{name:"L4",rows:24,cols:32,data:[]},{name:"L5",rows:24,cols:32,data:[]},{name:"L6",rows:24,cols:32,data:[]},
  {name:"S1",rows:12,cols:16,data:[]},{name:"S2",rows:12,cols:16,data:[]},{name:"S3",rows:12,cols:16,data:[]},{name:"S4",rows:12,cols:16,data:[]},{name:"S5",rows:12,cols:16,data:[]},{name:"S6",rows:12,cols:16,data:[]}
];
let currentTab=0;

function normalizeEntity(type,idx){
  const label=type==='players'?'Player':type==='allies'?'Ally':'Monster';
  if(!state.entities[type][idx]) state.entities[type][idx]={name:`${label} ${idx+1}`,hp:type==='monsters'?8:10,status1:"Normal",status2:"Normal"};
  return state.entities[type][idx];
}
function statusOptions(selected){return state.statuses.map(s=>`<option value="${escapeHtml(s)}" ${s===selected?'selected':''}>${escapeHtml(s)}</option>`).join('');}
function escapeHtml(str){return String(str).replace(/[&<>"]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));}
function renderEntities(){
  renderEntityType('players',$('players'));
  renderEntityType('allies',$('allies'));
  renderEntityType('monsters',$('monsters'));
}
function renderEntityType(type,container){
  container.innerHTML='';
  const count=state.counts[type];
  for(let i=0;i<count;i++){

  if($('quickStatsBox'))$('quickStatsBox').classList.toggle('isOff',o.showQuickStats===false);
  if($('counterBox'))$('counterBox').classList.toggle('isOff',o.showCounters===false);
  if($('lightBtn'))$('lightBtn').classList.toggle('isOff',o.showLight===false);
  if($('genOutput'))$('genOutput').classList.toggle('isOff',o.showGenOutput===false);
  if($('diceExtraControls'))$('diceExtraControls').classList.toggle('isOff',o.showDiceExtras===false);
}
function renderAll(){normalizeCounters();renderEntities();buildGridTabs();buildGrid();renderCounters();timerRender();renderTorch();$('diceHistory').innerHTML=diceHistory.join('');applyOptions();}
window.addEventListener('resize',()=>buildGrid());
applyTheme();renderAll();timerRender();renderTorch();
</script>
